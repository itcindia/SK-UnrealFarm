name: Build SK UnrealFarm Installer

on:
  push:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    # ------------------------
    # Python Setup
    # ------------------------
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - run: pip install pyinstaller

    # ------------------------
    # Build Manager
    # ------------------------
    - name: Build Manager
      run: |
        pyinstaller --onefile manager/manager.py
        mkdir package\manager
        copy dist\manager.exe package\manager\

    # ------------------------
    # Build Worker
    # ------------------------
    - name: Build Worker
      run: |
        pyinstaller --onefile worker/worker.py
        mkdir package\worker
        copy dist\worker.exe package\worker\

    # ------------------------
    # Setup Node + UI
    # ------------------------
    
    # ------------------------
    # Copy Config + NSSM
    # ------------------------
    - name: Copy Files
      run: |
        copy config.json package\
        copy nssm.exe package\

    # ------------------------
    # Install Inno Setup
    # ------------------------
    - name: Install Inno Setup
      run: choco install innosetup -y

    # ------------------------
    # Build Installer
    # ------------------------
    - name: Compile Installer
      run: |
        "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\SK_UnrealFarm_AllInOne.iss

    # ------------------------
    # Upload EXE
    # ------------------------
    - name: Upload Installer
      uses: actions/upload-artifact@v4
      with:
        name: SK-UnrealFarm-Installer
        path: Output\*.exe
